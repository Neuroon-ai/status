name: Static Site CI
on:
  schedule:
    - cron: "0 */8 * * *"
  push:
    paths:
      - "history/summary.json"
      - ".upptimerc.yml"
  repository_dispatch:
    types:
      - static_site
      - static_site_*
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  release:
    name: Build & deploy static site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Generate static site
        uses: upptime/uptime-monitor@master
        with:
          command: "site"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
      - name: Locate built export
        id: locate
        run: |
          echo '--- listing repo root ---'
          ls -la
          echo '--- looking for __sapper__/export ---'
          find . -name 'index.html' -path '*__sapper__/export*' 2>/dev/null | head -5 || true
          # Try common Upptime output paths in order
          for candidate in \
            "site/status-page/__sapper__/export" \
            "status-page/__sapper__/export" \
            "node_modules/@upptime/status-page/__sapper__/export" \
            "__sapper__/export"; do
            if [ -d "$candidate" ]; then
              echo "✅ Found export at: $candidate"
              echo "path=$candidate" >> "$GITHUB_OUTPUT"
              break
            fi
          done
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.locate.outputs.path }}
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

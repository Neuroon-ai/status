name: Static Site CI
on:
  schedule:
    - cron: "0 */8 * * *"
  push:
    paths:
      - "history/summary.json"
      - ".upptimerc.yml"
  repository_dispatch:
    types:
      - static_site
      - static_site_*
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  release:
    name: Build & deploy static site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Generate static site
        uses: upptime/uptime-monitor@master
        with:
          command: "site"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
      - name: Locate built export
        id: locate
        run: |
          for candidate in \
            "site/status-page/__sapper__/export" \
            "status-page/__sapper__/export" \
            "node_modules/@upptime/status-page/__sapper__/export" \
            "__sapper__/export"; do
            if [ -d "$candidate" ]; then
              echo "✅ Found export at: $candidate"
              echo "path=$candidate" >> "$GITHUB_OUTPUT"
              break
            fi
          done
      - name: Inject Neuroon custom CSS into all HTML files
        run: |
          set -e
          EXPORT_DIR="${{ steps.locate.outputs.path }}"
          INJECT='<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800\&family=JetBrains+Mono:wght@500\&display=swap" rel="stylesheet"><link href="https://docs.neuroon.ai/css/status-custom.css" rel="stylesheet">'
          find "$EXPORT_DIR" -name '*.html' -print0 | while IFS= read -r -d '' f; do
            sed -i 's#</head>#'"$INJECT"'</head>#' "$f"
            echo "  ✓ Injected into: $f"
          done
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.locate.outputs.path }}
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

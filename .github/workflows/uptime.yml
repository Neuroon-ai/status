name: Uptime CI
on:
  schedule:
    - cron: "*/5 * * * *"
  repository_dispatch:
    types:
      - uptime
      - uptime_*
  workflow_dispatch:

jobs:
  release:
    name: Check status
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - name: Update uptime
        uses: upptime/uptime-monitor@v1
        with:
          command: "update"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
